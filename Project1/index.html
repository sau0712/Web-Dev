<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile Form</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="left-box">
<img src="https://thumbs.dreamstime.com/b/front-view-four-concentrated-multiethnic-young-people-college-students-preparing-to-their-homework-library-room-looking-176568461.jpg" alt="Student Image">
<h2>Student Profile</h2>
<p>Fill your academic details carefully.</p>
</div>

<div class="right-box">

<form>

<h1>Student Profile Form</h1>

<label>Full Name</label>
<input type="text" placeholder="Enter full name">

<label>Email</label>
<input type="email" placeholder="Enter email">

<label>Mobile Number</label>
<input type="text" placeholder="Enter mobile number">

<label>Date of Birth</label>
<input type="date">

<label>Gender</label>
<div class="gender">
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</div>

<label>Course</label>
<select>
<option>Select Course</option>
<option>B.Tech</option>
<option>BCA</option>
<option>BBA</option>
<option>MCA</option>
</select>

<label>Address</label>
<textarea placeholder="Enter address"></textarea>

<label>Skills</label>
<div class="check">
<input type="checkbox"> C++
<input type="checkbox"> Python
<input type="checkbox"> Java
<input type="checkbox"> Web Design
</div>

<button type="submit">Submit</button>
<button type="reset">Reset</button>

</form>

</div>
</div>

</body>
</html>
